benchmark:
  version: "2.1"

  target_app:
    scheme: "https"
    host: "sec-team.waf-exams.info"
    port: 443
    control_secret: "waf-hackathon-2026-ctrl"

  waf:
    scheme: "https"
    host: "sec-team.waf-exams.info"
    port: 443
    binary_path: "./waf"
    config_path: "./waf.yaml"
    audit_log_path: "./waf_audit.log"

  phases:
    phase_a:
      reset_before_each: true
      timeout_per_test_ms: 5000

    phase_b:
      ip_ranges:
        brute_force: "127.0.0.10-19"
        relay: "127.0.0.20-39"
        behavioral: "127.0.0.40-59"
        fraud: "127.0.0.60-79"
        recon: "127.0.0.80-99"

    phase_c:
      duration_per_step_seconds: 30
      target_rps_steps: [1000, 3000, 5000, 10000]

    phase_d:
      ddos_duration_seconds: 60
      slowloris_connections: 500

  scoring:
    security_effectiveness: 40
    performance: 20
    intelligence: 20
    extensibility: 10
    architecture: 15
    dashboard: 10
    deployment: 5

  thresholds:
    p99_latency_ms: 5
    max_memory_mb: 100
    false_positive_rate_max: 0.01
