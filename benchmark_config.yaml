benchmark:
  version: "2.1"

  # Cấu hình Target Application (UPSTREAM)
  target_app:
    scheme: "http"
    host: "220.158.233.101"
    port: 9000
    control_secret: "waf-hackathon-2026-ctrl"

  # Cấu hình WAF-PROXY (Đối tượng đánh giá)
  waf:
    scheme: "http"
    host: "220.158.233.101"
    port: 8080
    admin_port: 8081
    metrics_port: 6190
    binary_path: "/var/www/WAF-PROXY/target/release/waf"
    config_path: "/var/www/WAF-PROXY/waf.yaml"
    audit_log_path: "/var/www/WAF-PROXY/waf_audit.log"

  # Cấu hình WAF-FE Dashboard
  waf_fe:
    host: "220.158.233.101"
    port: 3000
    enabled: true
    skip_if_unavailable: true

  # Resource Tier — WAF resource allocation level (BTC-controlled)
  # Values: "min" (2C/4GB), "mid" (4C/8GB, default), "full" (6C/12GB max)
  # If not set, defaults to WAF_RESOURCE_TIER env var, then "mid"
  resource_tier: "mid"

  # Danh sách Proxy IP
  proxy_pool_path: "/var/www/docs/hackathon/proxy_ip.md"
